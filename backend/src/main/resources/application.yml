spring:
  application:
    name: dsr-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/dsr_db?options=-c%20TimeZone=UTC
    username: dsr_user
    password: dsr_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

